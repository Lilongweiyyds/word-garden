<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍭 单词乐园 · 三至六年级全集 · 免费版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #b8e1ff 0%, #d4f0fd 100%);
            font-family: 'Comic Neue', 'Chalkboard SE', 'Inter', system-ui, cursive, sans-serif;
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        .cloud {
            position: fixed;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 80% 20% 70% 30% / 30% 70% 20% 80%;
            width: 200px;
            height: 80px;
            z-index: 0;
            pointer-events: none;
        }
        .cloud1 { top: 20px; left: 10px; }
        .cloud2 { bottom: 30px; right: 20px; width: 250px; height: 90px; }
        .cloud3 { top: 40%; right: 5%; width: 180px; height: 70px; }

        .register-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 241, 186, 0.95);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s;
        }

        .register-card {
            background: #fef9c3;
            border-radius: 5rem;
            padding: 3rem 4rem;
            border: 10px solid #fbbf24;
            box-shadow: 0 30px 0 #b45309, 0 40px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        .register-card h2 {
            font-size: 4rem;
            color: #1e3a8a;
            text-shadow: 4px 4px 0 #a5f3fc;
            margin-bottom: 1rem;
        }

        .register-card p {
            font-size: 2rem;
            color: #854d0e;
            margin-bottom: 2rem;
        }

        .register-input {
            font-size: 2.5rem;
            padding: 1rem 2rem;
            border-radius: 60px;
            border: 6px solid #f97316;
            background: white;
            width: 100%;
            text-align: center;
            font-family: inherit;
            margin-bottom: 2rem;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        }

        .register-btn {
            background: #f97316;
            border: none;
            color: white;
            font-size: 2.5rem;
            padding: 1.5rem 3rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            border: 6px solid #c2410c;
            box-shadow: 0 12px 0 #9a3412;
            transition: all 0.1s;
            width: 100%;
        }

        .register-btn:hover {
            transform: translateY(4px);
            box-shadow: 0 8px 0 #9a3412;
        }

        .welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 215, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1500;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .welcome-card {
            background: #fef9c3;
            border-radius: 5rem;
            padding: 3rem 5rem;
            border: 12px solid #f97316;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.5s;
        }

        .welcome-card.show {
            transform: scale(1);
        }

        .welcome-card h1 {
            font-size: 5rem;
            color: #1e3a8a;
            text-shadow: 4px 4px 0 #a5f3fc;
        }

        .welcome-card p {
            font-size: 3rem;
            color: #7c2d12;
        }

        .praise-toast {
            position: fixed;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fde047;
            border: 8px solid #eab308;
            border-radius: 60px;
            padding: 2rem 4rem;
            font-size: 3rem;
            font-weight: 800;
            color: #713f12;
            text-align: center;
            box-shadow: 0 20px 0 #b45309, 0 30px 30px rgba(0,0,0,0.2);
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .app {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 4rem 4rem 3rem 3rem;
            box-shadow: 0 30px 40px -15px rgba(0, 80, 200, 0.4);
            overflow: hidden;
            padding: 2rem 2rem 3rem;
            border: 5px solid white;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #f97316, #c026d3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 4px 4px 0 #ffeaa5;
            margin-bottom: 0.2rem;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.4rem;
            color: #0369a1;
            background: #fffbeb;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            box-shadow: 0 4px 0 #fbbf24;
            font-weight: 600;
        }

        .grade-nav {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .grade-btn {
            padding: 0.7rem 2rem;
            border-radius: 60px;
            border: 4px solid #f97316;
            background: white;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 700;
            color: #7c2d12;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #b45309;
        }

        .grade-btn.active {
            background: #f97316;
            color: white;
            border-color: #7c2d12;
            box-shadow: 0 4px 0 #7c2d12;
            transform: translateY(2px);
        }

        .nav-container {
            background: #fef9c3;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            margin-bottom: 2rem;
            border: 4px solid #facc15;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 #ca8a04;
        }

        .nav-level {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-label {
            font-weight: 700;
            color: #854d0e;
            font-size: 1.2rem;
            background: #ffedd5;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .semester-btn, .unit-btn {
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            border: 3px solid #f97316;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            color: #7c2d12;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #b45309;
        }

        .semester-btn.active, .unit-btn.active {
            background: #f97316;
            color: white;
            border-color: #7c2d12;
            box-shadow: 0 4px 0 #7c2d12;
            transform: translateY(2px);
        }

        .separator {
            color: #f97316;
            font-size: 2rem;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .stat-item {
            background: #f0f9ff;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-size: 1.2rem;
            color: #075985;
            border: 3px solid #38bdf8;
            box-shadow: 0 5px 0 #0284c7;
            font-weight: 600;
        }

        .stat-item span {
            font-weight: 800;
            color: #e11d48;
            margin-right: 0.3rem;
            background: white;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        .total-stars {
            background: #fff7ed;
            border-color: #fbbf24;
        }
        .total-stars span { color: #b45309; }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            border-left: 12px solid #f97316;
            padding-left: 1.5rem;
            color: #1e3a8a;
            text-shadow: 2px 2px 0 #a5f3fc;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .word-card {
            background: #fefce8;
            border: 5px solid #fcd34d;
            border-radius: 2.5rem;
            padding: 1.5rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 12px 0 #b45309;
            position: relative;
        }

        .word-card.completed {
            background: #d9f99d;
            border-color: #4d7c0f;
            box-shadow: 0 12px 0 #3f6212;
        }

        .word-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 #b45309;
        }

        .word-card .word {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 0.3rem;
        }

        .word-card .meaning {
            color: #475569;
            font-size: 1.2rem;
            background: #fef9c3;
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            border: 2px solid #fbbf24;
        }

        .star-icon {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 2.5rem;
            filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.2));
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal {
            background: #fffbeb;
            max-width: 700px;
            width: 100%;
            border-radius: 4rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 40px -10px #334155, 0 15px 0 #b45309;
            border: 8px solid #fcd34d;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-close {
            position: absolute;
            top: 1.2rem;
            right: 1.8rem;
            background: #fee2e2;
            border: 3px solid #ef4444;
            font-size: 2.2rem;
            cursor: pointer;
            color: #b91c1c;
            line-height: 1;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 0 #b91c1c;
        }

        .modal-close:hover {
            background: #fecaca;
        }

        .modal-word-area {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem 1.5rem;
            margin-bottom: 1rem;
            background: #fef9c3;
            padding: 1rem 2rem;
            border-radius: 60px;
            border: 4px solid #fbbf24;
        }

        .modal-word {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1e293b;
        }

        .modal-phonetic {
            font-size: 1.8rem;
            color: #475569;
            font-family: 'Courier New', monospace;
            background: #e2e8f0;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
        }

        .sound-btn {
            background: #38bdf8;
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            border: 4px solid #0284c7;
            box-shadow: 0 6px 0 #0369a1;
            font-weight: 600;
        }

        .sound-btn:hover {
            background: #7dd3fc;
        }

        .modal-section {
            margin: 2rem 0 1.5rem;
            background: #e0f2fe;
            padding: 1.5rem;
            border-radius: 2.5rem;
            border: 4px solid #38bdf8;
        }

        .modal-section h4 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #0c4a6e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-section p, .modal-section li {
            color: #0f172a;
            background: #f8fafc;
            padding: 0.8rem 1.5rem;
            border-radius: 1.8rem;
            margin-bottom: 0.6rem;
            border: 2px solid #7dd3fc;
            font-size: 1.2rem;
        }

        .modal-section ul {
            list-style: none;
        }

        .game-area {
            background: #fef08a;
            border-radius: 2.5rem;
            padding: 1.8rem;
            border: 6px solid #eab308;
            margin-top: 2rem;
        }

        .game-title {
            font-size: 2rem;
            font-weight: 700;
            color: #854d0e;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .question {
            background: white;
            border-radius: 2rem;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 3px solid #f97316;
        }

        .question p {
            font-size: 1.4rem;
            font-weight: 600;
            color: #7c2d12;
            margin-bottom: 1rem;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .option-btn {
            background: #ffedd5;
            border: 3px solid #fb923c;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #7b341e;
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #c2410c;
        }

        .option-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .feedback {
            font-size: 1.4rem;
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 60px;
            text-align: center;
            font-weight: 600;
        }

        .next-btn {
            background: #f97316;
            color: white;
            border: none;
            font-size: 1.6rem;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            margin: 1.5rem auto 0;
            display: block;
            border: 4px solid #c2410c;
            box-shadow: 0 8px 0 #9a3412;
        }

        .next-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .game-complete {
            background: #fde047;
            border-radius: 2rem;
            padding: 1.5rem;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #713f12;
            border: 5px solid #eab308;
        }

        .footer-note {
            text-align: center;
            margin-top: 3rem;
            color: #075985;
            font-size: 1.2rem;
            border-top: 4px dashed #38bdf8;
            padding-top: 2rem;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .app { padding: 1rem; }
            .modal { padding: 1.5rem; }
            .modal-word { font-size: 2.5rem; }
            .register-card { padding: 2rem; }
            .register-card h2 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- 注册页面 -->
    <div class="register-overlay" id="registerOverlay">
        <div class="register-card">
            <h2>🎈 单词乐园</h2>
            <p>小勇士，你叫什么名字？</p>
            <input type="text" class="register-input" id="playerNameInput" placeholder="输入你的名字" maxlength="20">
            <button class="register-btn" id="startBtn">开始冒险 🚀</button>
        </div>

    <div class="praise-toast" id="praiseToast"></div>

        <div class="grade-nav" id="gradeNav">
            <button class="grade-btn" data-grade="grade3">三年级</button>
            <button class="grade-btn" data-grade="grade4">四年级</button>
            <button class="grade-btn" data-grade="grade5">五年级</button>
            <button class="grade-btn active" data-grade="grade6">六年级</button>
        </div>

        <!-- 学期/单元导航 -->
        <div class="nav-container">
            <div class="nav-level">
                <span class="nav-label">📅 学期</span>
                <div class="nav-buttons" id="semesterNav">
                    <button class="semester-btn active" data-semester="a">上册 🍂</button>

            <div class="stat-item">📖 单词 <span id="wordCount">0</span> 个</div>
        </div>

        <!-- 单词卡片网格 -->
        <h2 class="section-title">🔤 点开单词开始闯关 👆</h2>
        <div class="card-grid" id="wordCardGrid"></div>

        <div class="footer-note">

        </div>
    </div>

    <!-- 单词详情模态框 -->

        <div class="modal" id="modalContent">
            <button class="modal-close" id="closeModalBtn">✖</button>
            <div id="modalInner"></div>
        </div>
    </div>

    <script>

                    { word: "sharpener", phonetic: "/ˈʃɑːrpənər/", meaning: "卷笔刀", usage: "pencil sharpener", grammar: "可数名词", examples: ["Use the sharpener."] },

                    { word: "yellow", phonetic: "/ˈjeloʊ/", meaning: "黄色", usage: "yellow flower", grammar: "形容词", examples: ["The sun is yellow."] },

                    { word: "black", phonetic: "/blæk/", meaning: "黑色", usage: "black cat", grammar: "形容词", examples: ["I have a black pen."] },

            setTimeout(() => {
                welcomeOverlay.style.opacity = '0';
                welcomeOverlay.style.pointerEvents = 'none';
            }, 2000);
        }

        function showPraise(level) {
            const messages = ['🎉 太棒了！', '🌟 你真是个小天才！', '✨ 哇！超级厉害！'];
            const message = messages[level - 1] || messages[0];
            praiseToast.innerText = `${playerName} ${message}`;
            praiseToast.style.opacity = '1';
            setTimeout(() => {
                praiseToast.style.opacity = '0';
            }, 1500);
        }

        // ==================== 渲染单元导航 ====================
        function renderUnitNav() {
            const gradeData = allGradesData[currentGrade];
            if (!gradeData) return;
            const semesterData = gradeData[currentSemester];
            if (!semesterData) return;

            let html = '';
            let unitIndex = 1;
            while (semesterData[`unit${unitIndex}`]) {
                const unit = semesterData[`unit${unitIndex}`];
                const activeClass = currentUnit === `unit${unitIndex}` ? 'active' : '';
                html += `<button class="unit-btn ${activeClass}" data-unit="unit${unitIndex}">${unit.name}</button>`;
                unitIndex++;
            }
            unitNav.innerHTML = html;

            document.querySelectorAll('.unit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentUnit = btn.dataset.unit;
                    renderWordCards();
                });
            });
        }

        // ==================== 渲染单词卡片 ====================
        function renderWordCards() {
            const gradeData = allGradesData[currentGrade];
            if (!gradeData) return;
            const semesterData = gradeData[currentSemester];
            if (!semesterData) return;
            const unitData = semesterData[currentUnit];
            if (!unitData) return;

            const gradeNames = { grade3: '三年级', grade4: '四年级', grade5: '五年级', grade6: '六年级' };
            const semesterName = currentSemester === 'a' ? '上册' : '下册';
            unitNameSpan.textContent = `${gradeNames[currentGrade]} ${semesterName} ${unitData.name}`;
            wordCountSpan.textContent = unitData.words.length;

            let html = '';
            unitData.words.forEach(word => {
                const wordKey = getWordKey(word.word, currentUnit);
                const completed = progress[wordKey] || false;
                const starIcon = completed ? '<div class="star-icon">⭐</div>' : '';
                html += `
                    <div class="word-card ${completed ? 'completed' : ''}" data-word='${JSON.stringify(word).replace(/'/g, "&apos;")}' data-unit="${currentUnit}">
                        <div class="word">${word.word}</div>
                        <div class="meaning">${word.meaning}</div>
                        ${starIcon}
                    </div>
                `;
            });
            cardGrid.innerHTML = html;

            document.querySelectorAll('.word-card').forEach(card => {
                card.addEventListener('click', () => {
                    const wordData = JSON.parse(card.dataset.word.replace(/&apos;/g, "'"));
                    showModal(wordData);
                });
            });

            totalStarsSpan.innerText = countTotalStars();
        }

        // ==================== 闯关模态框 ====================
        function showModal(word) {
            const wordKey = getWordKey(word.word, currentUnit);
            const completed = progress[wordKey] || false;
            const examplesHtml = word.examples.map(ex => `<li>“${ex}”</li>`).join('');

            const meaningOptions = generateMeaningOptions(word);
            const wordOptions = generateWordOptions(word);
            const spellingQuestion = generateSpellingQuestion(word);

            let gameHtml = '';
            if (!completed) {
                gameHtml = `
                    <div class="game-area" id="gameArea">
                        <div class="game-title">🎮 闯关挑战 <span style="font-size:1.2rem;">(答对三关得⭐)</span></div>
                        <div id="gameContent">
                            <div class="question" id="q1">
                                <p>🔰 第一关：选出 <strong>${word.word}</strong> 的正确中文意思</p>
                                <div class="options" id="q1Options">
                                    ${meaningOptions.map(opt => `<button class="option-btn" data-value="${opt}">${opt}</button>`).join('')}
                                </div>
                                <div class="feedback" id="q1Feedback"></div>
                            </div>
                            <div class="question" id="q2" style="display:none;">
                                <p>🔰 第二关：哪个单词是 <strong>“${word.meaning}”</strong> ？</p>
                                <div class="options" id="q2Options">
                                    ${wordOptions.map(opt => `<button class="option-btn" data-value="${opt}">${opt}</button>`).join('')}
                                </div>
                                <div class="feedback" id="q2Feedback"></div>
                            </div>
                            <div class="question" id="q3" style="display:none;">
                                <p>🔰 第三关：拼写填空  <strong>${spellingQuestion.display}</strong></p>
                                <div class="options" id="q3Options">
                                    ${spellingQuestion.options.map(opt => `<button class="option-btn" data-value="${opt}">${opt}</button>`).join('')}
                                </div>
                                <div class="feedback" id="q3Feedback"></div>
                            </div>
                            <button class="next-btn" id="nextGameBtn" disabled>下一关 →</button>
                        </div>
                    </div>
                `;
            } else {
                gameHtml = `
                    <div class="game-area" style="background:#fde047;">
                        <div class="game-title">⭐ 已完成闯关 ⭐</div>
                        <p style="font-size:1.5rem; text-align:center;">你真棒！已经收集了这颗星星✨</p>
                    </div>
                `;
            }

            modalInner.innerHTML = `
                <div>
                    <div class="modal-word-area">
                        <span class="modal-word">${word.word}</span>
                        <span class="modal-phonetic">${word.phonetic}</span>
                        <button class="sound-btn" id="speakBtn">🔊 发音</button>
                    </div>
                    
                    <div class="modal-section">
                        <h4>📖 基本释义</h4>
                        <p>${word.meaning}</p>
                    </div>

                    <div class="modal-section">
                        <h4>💡 用法</h4>
                        <p>${word.usage}</p>
                    </div>

                    <div class="modal-section">
                        <h4>📚 语法深析</h4>
                        <p>${word.grammar}</p>
                    </div>

                    <div class="modal-section">
                        <h4>✍️ 例句</h4>
                        <ul style="list-style: none;">${examplesHtml}</ul>
                    </div>

                    ${gameHtml}
                </div>
            `;

            modalOverlay.style.display = 'flex';

            const speakBtn = document.getElementById('speakBtn');
            if (speakBtn) {
                speakBtn.addEventListener('click', () => {
                    const utterance = new SpeechSynthesisUtterance(word.word);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                });
            }

            if (completed) return;

            // 游戏状态
            let currentLevel = 1;
            let q1Correct = false;
            let q2Correct = false;
            let q3Correct = false;

            const q1Div = document.getElementById('q1');
            const q2Div = document.getElementById('q2');
            const q3Div = document.getElementById('q3');
            const nextBtn = document.getElementById('nextGameBtn');
            const q1Options = document.querySelectorAll('#q1Options .option-btn');
            const q2Options = document.querySelectorAll('#q2Options .option-btn');
            const q3Options = document.querySelectorAll('#q3Options .option-btn');
            const q1Feedback = document.getElementById('q1Feedback');
            const q2Feedback = document.getElementById('q2Feedback');
            const q3Feedback = document.getElementById('q3Feedback');

            // 第一关
            q1Options.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (q1Correct) return;
                    const selected = btn.dataset.value;
                    if (selected === word.meaning) {
                        q1Correct = true;
                        q1Feedback.innerText = '✅ 答对了！';
                        q1Feedback.style.background = '#bbf7d0';
                        q1Options.forEach(b => b.disabled = true);
                        nextBtn.disabled = false;
                        showPraise(1);
                    } else {
                        q1Feedback.innerText = '❌ 不对哦，再试试看';
                        q1Feedback.style.background = '#fecaca';
                    }
                });
            });

            // 下一关
            nextBtn.addEventListener('click', () => {
                if (currentLevel === 1 && q1Correct) {
                    q1Div.style.display = 'none';
                    q2Div.style.display = 'block';
                    nextBtn.disabled = true;
                    currentLevel = 2;
                } else if (currentLevel === 2 && q2Correct) {
                    q2Div.style.display = 'none';
                    q3Div.style.display = 'block';
                    nextBtn.disabled = true;
                    currentLevel = 3;
                } else if (currentLevel === 3 && q3Correct) {
                    progress[wordKey] = true;
                    saveProgress();
                    totalStarsSpan.innerText = countTotalStars();
                    renderWordCards();
                    document.getElementById('gameArea').innerHTML = `
                        <div class="game-complete">
                            🎉 恭喜！你完成了所有关卡！获得星星 ⭐
                        </div>
                    `;
                }
            });

            // 第二关
            q2Options.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (q2Correct) return;
                    const selected = btn.dataset.value;
                    if (selected === word.word) {
                        q2Correct = true;
                        q2Feedback.innerText = '✅ 答对了！';
                        q2Feedback.style.background = '#bbf7d0';
                        q2Options.forEach(b => b.disabled = true);
                        nextBtn.disabled = false;
                        showPraise(2);
                    } else {
                        q2Feedback.innerText = '❌ 不对哦，再试试看';
                        q2Feedback.style.background = '#fecaca';
                    }
                });
            });

            // 第三关
            q3Options.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (q3Correct) return;
                    const selected = btn.dataset.value;
                    if (selected === spellingQuestion.correctLetter) {
                        q3Correct = true;
                        q3Feedback.innerText = '✅ 答对了！';
                        q3Feedback.style.background = '#bbf7d0';
                        q3Options.forEach(b => b.disabled = true);
                        nextBtn.disabled = false;
                        showPraise(3);
                    } else {
                        q3Feedback.innerText = '❌ 不对哦，再试试看';
                        q3Feedback.style.background = '#fecaca';
                    }
                });
            });
        }

        // ==================== 辅助函数（生成选项）====================
        function generateMeaningOptions(word) {
            const semesterData = allGradesData[currentGrade][currentSemester];
            const unitData = semesterData[currentUnit];
            const otherMeanings = unitData.words.filter(w => w.word !== word.word).map(w => w.meaning);
            let options = [word.meaning];
            while (options.length < 4 && otherMeanings.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherMeanings.length);
                const candidate = otherMeanings[randomIndex];
                if (!options.includes(candidate)) {
                    options.push(candidate);
                }
                otherMeanings.splice(randomIndex, 1);
            }
            while (options.length < 4) {
                options.push('苹果');
            }
            return shuffleArray(options);
        }

        function generateWordOptions(word) {
            const semesterData = allGradesData[currentGrade][currentSemester];
            const unitData = semesterData[currentUnit];
            const otherWords = unitData.words.filter(w => w.word !== word.word).map(w => w.word);
            let options = [word.word];
            while (options.length < 4 && otherWords.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherWords.length);
                const candidate = otherWords[randomIndex];
                if (!options.includes(candidate)) {
                    options.push(candidate);
                }
                otherWords.splice(randomIndex, 1);
            }
            while (options.length < 4) {
                options.push('cat');
            }
            return shuffleArray(options);
        }

        function generateSpellingQuestion(word) {
            const w = word.word;
            if (w.length <= 1) return { display: w, options: [w], correctLetter: w };
            const pos = Math.floor(Math.random() * (w.length - 1)) + 1;
            const missing = w[pos];
            const display = w.slice(0, pos) + ' _ ' + w.slice(pos + 1);
            const letters = 'abcdefghijklmnopqrstuvwxyz';
            let options = [missing];
            while (options.length < 3) {
                const randomLetter = letters[Math.floor(Math.random() * 26)];
                if (!options.includes(randomLetter)) {
                    options.push(randomLetter);
                }
            }
            return {
                display: display,
                options: shuffleArray(options),
                correctLetter: missing
            };
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ==================== 关闭模态框 ====================
        function closeModal() {
            modalOverlay.style.display = 'none';
        }

        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                closeModal();
            }
        });

        // ==================== 年级切换 ====================
        gradeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetGrade = btn.dataset.grade;
                gradeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentGrade = targetGrade;
                currentUnit = 'unit1';
                renderUnitNav();
                renderWordCards();
            });
        });

        // ==================== 学期切换 ====================
        semesterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetSemester = btn.dataset.semester;
                semesterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSemester = targetSemester;
                currentUnit = 'unit1';
                renderUnitNav();
                renderWordCards();
            });
        });

        // ==================== 初始化 ====================
        // 默认激活三年级和上册
        document.querySelectorAll('.grade-btn').forEach(btn => {
            if (btn.dataset.grade === currentGrade) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        document.querySelectorAll('.semester-btn').forEach(btn => {
            if (btn.dataset.semester === currentSemester) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        renderUnitNav();
        renderWordCards();
    </script>
</body>
</html>
